<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WebAuthn Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:     #0a0a0f;
    --surface:#12121a;
    --border: #1e1e2e;
    --accent: #6ee7b7;
    --accent2: #818cf8;
    --text:   #e2e8f0;
    --muted:  #64748b;
    --error:  #f87171;
    --success:#6ee7b7;
    --radius: 12px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    overflow: hidden;
  }

  /* Ambient background blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 600px; height: 600px;
    background: var(--accent2);
    top: -200px; left: -200px;
  }
  body::after {
    width: 500px; height: 500px;
    background: var(--accent);
    bottom: -150px; right: -150px;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3rem;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.03), 0 32px 64px rgba(0,0,0,0.5);
  }

  /* Glowing top edge */
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 20%; right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 999px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
  }

  .logo-text {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  .logo-sub {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  h1 {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin-bottom: 0.5rem;
  }

  h1 span {
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
    line-height: 1.5;
  }

  /* Tabs */
  .tabs {
    display: flex;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 1.8rem;
    gap: 4px;
  }

  .tab {
    flex: 1;
    padding: 0.6rem;
    border: none;
    border-radius: 8px;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* Input */
  .field {
    margin-bottom: 1.2rem;
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  input[type="text"] {
    width: 100%;
    padding: 0.85rem 1rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(129,140,248,0.15);
  }

  input[type="text"]::placeholder { color: var(--muted); }

  /* Primary button */
  .btn {
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    position: relative;
    overflow: hidden;
  }

  .btn-register {
    background: linear-gradient(135deg, var(--accent2), #a78bfa);
    color: #fff;
    box-shadow: 0 4px 16px rgba(129,140,248,0.3);
  }

  .btn-register:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(129,140,248,0.4);
  }

  .btn-login {
    background: linear-gradient(135deg, var(--accent), #34d399);
    color: #0a0a0f;
    box-shadow: 0 4px 16px rgba(110,231,183,0.25);
  }

  .btn-login:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 24px rgba(110,231,183,0.35);
  }

  .btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
  }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .btn.loading .spinner { display: block; }
  .btn.loading .btn-label { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Status banner */
  .status {
    margin-top: 1.2rem;
    padding: 0.8rem 1rem;
    border-radius: var(--radius);
    font-size: 0.85rem;
    font-family: 'Space Mono', monospace;
    display: none;
    align-items: flex-start;
    gap: 0.6rem;
    line-height: 1.5;
    word-break: break-word;
  }

  .status.show { display: flex; }

  .status.success {
    background: rgba(110,231,183,0.08);
    border: 1px solid rgba(110,231,183,0.25);
    color: var(--success);
  }

  .status.error {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.25);
    color: var(--error);
  }

  .status-icon { flex-shrink: 0; font-size: 1rem; }

  /* Feature pills */
  .features {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin-top: 1.8rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .pill {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 0.2rem 0.65rem;
  }

  /* Panel animation */
  .panel { animation: fadeUp 0.25s ease; }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(8px); }
    to   { opacity:1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔑</div>
    <div>
      <div class="logo-text">PassKey</div>
      <div class="logo-sub">WebAuthn / FIDO2</div>
    </div>
  </div>

  <h1>Passwordless<br /><span>Authentication</span></h1>
  <p class="subtitle">Sign in securely with your device's biometrics or hardware key — no passwords needed.</p>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('register')">Register</button>
    <button class="tab"        onclick="switchTab('login')">Sign In</button>
  </div>

  <!-- Register panel -->
  <div id="panel-register" class="panel">
    <div class="field">
      <label for="reg-user">Username</label>
      <input type="text" id="reg-user" placeholder="alice" autocomplete="username webauthn" />
    </div>
    <button class="btn btn-register" id="btn-register" onclick="register()">
      <div class="spinner"></div>
      <span class="btn-label">🛡 Create Passkey</span>
    </button>
    <div class="status" id="reg-status"></div>
  </div>

  <!-- Login panel -->
  <div id="panel-login" class="panel" style="display:none">
    <div class="field">
      <label for="login-user">Username</label>
      <input type="text" id="login-user" placeholder="alice" autocomplete="username webauthn" />
    </div>
    <button class="btn btn-login" id="btn-login" onclick="login()">
      <div class="spinner"></div>
      <span class="btn-label">✦ Sign In</span>
    </button>
    <div class="status" id="login-status"></div>
  </div>

  <div class="features">
    <span class="pill">FIDO2</span>
    <span class="pill">WebAuthn L2</span>
    <span class="pill">Biometrics</span>
    <span class="pill">Hardware Keys</span>
    <span class="pill">No Passwords</span>
  </div>
</div>

<script>
// ---------------------------------------------------------------------------
// Tab switching
// ---------------------------------------------------------------------------
function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && name === 'register') || (i === 1 && name === 'login'));
  });
  document.getElementById('panel-register').style.display = name === 'register' ? 'block' : 'none';
  document.getElementById('panel-login').style.display   = name === 'login'    ? 'block' : 'none';
}

// ---------------------------------------------------------------------------
// Helpers: base64url ↔ Uint8Array
// ---------------------------------------------------------------------------
function b64urlToBytes(b64) {
  // Normalise base64url → standard base64 with padding
  b64 = b64.replace(/-/g, '+').replace(/_/g, '/');
  while (b64.length % 4) b64 += '=';
  const bin = atob(b64);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}

function bytesToB64url(buf) {
  const bytes = buf instanceof ArrayBuffer ? new Uint8Array(buf) : buf;
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// ---------------------------------------------------------------------------
// UI helpers
// ---------------------------------------------------------------------------
function setLoading(btnId, on) {
  const btn = document.getElementById(btnId);
  btn.classList.toggle('loading', on);
  btn.disabled = on;
}

function showStatus(id, ok, msg) {
  const el = document.getElementById(id);
  el.className = 'status show ' + (ok ? 'success' : 'error');
  el.innerHTML = `<span class="status-icon">${ok ? '✓' : '✗'}</span><span>${msg}</span>`;
}

// ---------------------------------------------------------------------------
// Encode the browser's PublicKeyCredential into a plain JSON-able object.
// The Credential object's properties are not enumerable, so we copy manually.
// ---------------------------------------------------------------------------
function encodeRegistrationCredential(cred) {
  return {
    id:    cred.id,
    rawId: bytesToB64url(cred.rawId),
    type:  cred.type,
    response: {
      attestationObject: bytesToB64url(cred.response.attestationObject),
      clientDataJSON:    bytesToB64url(cred.response.clientDataJSON),
    },
  };
}

function encodeAuthenticationCredential(cred) {
  const resp = {
    authenticatorData: bytesToB64url(cred.response.authenticatorData),
    clientDataJSON:    bytesToB64url(cred.response.clientDataJSON),
    signature:         bytesToB64url(cred.response.signature),
  };
  if (cred.response.userHandle) {
    resp.userHandle = bytesToB64url(cred.response.userHandle);
  }
  return {
    id:    cred.id,
    rawId: bytesToB64url(cred.rawId),
    type:  cred.type,
    response: resp,
  };
}

// ---------------------------------------------------------------------------
// Register
// ---------------------------------------------------------------------------
async function register() {
  const username = document.getElementById('reg-user').value.trim();
  if (!username) { showStatus('reg-status', false, 'Please enter a username.'); return; }

  setLoading('btn-register', true);
  try {
    // 1. Get challenge from server
    const res = await fetch('/register/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Server error during registration start');
    }
    const options = await res.json();

    // 2. Decode base64url fields the browser requires as bytes
    options.challenge = b64urlToBytes(options.challenge);
    options.user.id   = b64urlToBytes(options.user.id);
    if (options.excludeCredentials) {
      options.excludeCredentials = options.excludeCredentials.map(c => ({
        ...c, id: b64urlToBytes(c.id),
      }));
    }

    // 3. Ask the authenticator to create a credential
    const cred = await navigator.credentials.create({ publicKey: options });

    // 4. Send attestation to server
    const finish = await fetch('/register/finish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, ...encodeRegistrationCredential(cred) }),
    });
    if (!finish.ok) {
      const err = await finish.json().catch(() => ({}));
      throw new Error(err.detail || 'Server error during registration finish');
    }

    showStatus('reg-status', true, `Passkey created for <b>${username}</b>! You can now sign in.`);
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      showStatus('reg-status', false, 'Permission denied or timeout — please try again.');
    } else {
      showStatus('reg-status', false, e.message);
    }
  } finally {
    setLoading('btn-register', false);
  }
}

// ---------------------------------------------------------------------------
// Login
// ---------------------------------------------------------------------------
async function login() {
  const username = document.getElementById('login-user').value.trim();
  if (!username) { showStatus('login-status', false, 'Please enter a username.'); return; }

  setLoading('btn-login', true);
  try {
    // 1. Get challenge from server
    const res = await fetch('/login/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username }),
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.detail || 'Server error during login start');
    }
    const options = await res.json();

    // 2. Decode base64url fields
    options.challenge = b64urlToBytes(options.challenge);
    if (options.allowCredentials) {
      options.allowCredentials = options.allowCredentials.map(c => ({
        ...c, id: b64urlToBytes(c.id),
      }));
    }

    // 3. Ask the authenticator to sign the challenge
    const cred = await navigator.credentials.get({ publicKey: options });

    // 4. Send assertion to server
    const finish = await fetch('/login/finish', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, ...encodeAuthenticationCredential(cred) }),
    });
    if (!finish.ok) {
      const err = await finish.json().catch(() => ({}));
      throw new Error(err.detail || 'Authentication failed');
    }

    showStatus('login-status', true, `Welcome back, <b>${username}</b>! Authentication successful.`);
  } catch (e) {
    if (e.name === 'NotAllowedError') {
      showStatus('login-status', false, 'Permission denied or timeout — please try again.');
    } else {
      showStatus('login-status', false, e.message);
    }
  } finally {
    setLoading('btn-login', false);
  }
}
</script>
</body>
</html>
